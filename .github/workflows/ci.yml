name: CI

run-name: >
  ${{
    github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      && format('CI Release {0}', github.ref_name)
      || format('CI Build #{0}', github.run_number)
  }}

on:
  push:
    branches:
      - main
      - feature/*
      - bugfix/*
      - hotfix/*
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  workflow_dispatch:
    inputs:
      version:
        description: 'Release version override (ex: 1.3.0)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Resolve version
      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT

          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT

          else
            # Determine next development version
            LATEST_TAG=$(git tag --list "v*" --sort=-v:refname | head -n 1)

            if [ -z "$LATEST_TAG" ]; then
              BASE="0.1.0"
            else
              BASE=${LATEST_TAG#v}
              MAJOR=$(echo $BASE | cut -d. -f1)
              MINOR=$(echo $BASE | cut -d. -f2)
              NEXT_MINOR=$((MINOR+1))
              BASE="$MAJOR.$NEXT_MINOR.0"
            fi

            VERSION="$BASE-dev.${{ github.run_number }}"

            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

          echo "Resolved Version: $VERSION"

      - name: Show resolved version
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Is release: ${{ steps.version.outputs.is_release }}"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build and test with Maven
        run: |
          mvn clean install \
            -Drevision=${{ steps.version.outputs.version }}

      - name: Rename artifact
        run: |
          JAR=$(ls target/*.jar | grep -v "sources" | grep -v "javadoc" | head -n 1)
          mv "$JAR" "target/app-${{ steps.version.outputs.version }}.jar"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ steps.version.outputs.version }}
          path: target/app-${{ steps.version.outputs.version }}.jar